<!DOCTYPE html>
<html>
<head>
<title>Bank Welcome</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff7a18,#ffb347);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#ff6f00;
margin-bottom:30px;
}

.btn{
display:block;
margin-top:15px;
padding:12px;
background:#ff6f00;
color:white;
text-decoration:none;
border-radius:6px;
font-size:16px;
}

.btn i{
margin-right:8px;
}

.btn:hover{
background:#e65c00;
}

</style>
</head>

<body>

<div class="box">

<h1>Welcome to SmaBank</h1>

<a href="/login" class="btn">
<i class="fa-solid fa-right-to-bracket"></i>
Login
</a>

<a href="/register" class="btn">
<i class="fa-solid fa-user-plus"></i>
Register
</a>

<a href="/adminLogin" class="btn">
<i class="fa-solid fa-user-plus"></i>
Admin Login
</a>

</div>

</body>
</html>
