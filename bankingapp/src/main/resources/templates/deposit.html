<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Deposit Money</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#ff7a18,#ffb347);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:380px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#ff6a00;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:95%;
padding:12px;
background:#ff6a00;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e55c00;
}

.back{
margin-top:15px;
display:block;
text-decoration:none;
color:#444;
}

</style>

<script>

function validatePin(){
let pin=document.getElementById("pin").value;

if(pin.length!=4){
alert("❌ Invalid PIN");
return false;
}

return true;
}

</script>

</head>

<body>

<div class="container">

<h2>💰 Deposit Money</h2>

<form action="/deposit" method="post" onsubmit="return validatePin()">

<input type="number" name="amount" placeholder="Enter Amount" required>

<input type="password" id="pin" name="pin" placeholder="Enter 4 Digit PIN" required>

<button type="submit">Deposit</button>

</form>

<a class="back" href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
