<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Transfer Money</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#8360c3,#2ebf91);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:400px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#6a0dad;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:95%;
padding:12px;
background:#6a0dad;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4b0082;
}

</style>

<script>

function validatePin(){
let pin=document.getElementById("pin").value;

if(pin.length!=4){
alert("❌ Invalid PIN");
return false;
}

return true;
}

</script>

</head>

<body>

<div class="container">

<h2>💳 Transfer Money</h2>

<form action="/transfer" method="post" onsubmit="return validatePin()">

<input type="text" name="toAccount" placeholder="Receiver Account Number" required>

<input type="number" name="amount" placeholder="Enter Amount" required>

<input type="password" id="pin" name="pin" placeholder="Enter PIN" required>

<button type="submit">Transfer</button>

</form>

</div>

</body>
</html>
